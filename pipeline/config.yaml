# V8 C++ to Rust Conversion Pipeline — Configuration

source:
  root: "../codebase"
  include_dir: "include"
  src_dir: "src"
  extensions: [".h", ".cc", ".cpp"]
  exclude_patterns:
    - "**/test/**"
    - "**/testing/**"
    - "**/*_unittest*"
    - "**/*_test.*"
    - "**/*-test.*"

output:
  root: "../output/v8-rust"

cache:
  dir: "../.pipeline-cache"

model:
  # Providers: "claude", "gemini", "gemini-rotating", "openrouter"
  #
  # "gemini-rotating" — Recommended for free-tier usage.
  #   Rotates across all free Gemini models to maximize daily throughput:
  #     gemini-2.5-flash-lite : 15 RPM, 1,000 RPD
  #     gemini-2.5-flash      : 10 RPM,   250 RPD
  #     gemini-2.5-pro        :  5 RPM,   100 RPD
  #     gemini-2.0-flash      :  5 RPM,   100 RPD
  #   Total: ~1,350 free requests/day (~6,750 files at batch_size=5)
  #
  # "gemini" — Single Gemini model (no rotation).
  # "claude" — Anthropic Claude (paid).
  # "openrouter" — OpenRouter (free models often rate-limited):
  #     qwen/qwen3-coder:free, meta-llama/llama-4-maverick:free
  #
  provider: "gemini"
  name: "gemini-2.5-flash-lite"
  api_key_env: "GEMINI_API_KEY"
  max_tokens: 8192

conversion:
  # Max files to convert per AI call
  batch_size: 5
  # Max parallel conversion workers (for future use)
  max_concurrent: 4
  # Retry failed API calls up to N times
  max_retries: 3
  # Max file size in bytes before truncation
  max_file_size: 150000
  # Delay between retries (seconds, multiplied by attempt number)
  retry_delay: 5
