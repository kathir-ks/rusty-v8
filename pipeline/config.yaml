# V8 C++ to Rust Conversion Pipeline — Configuration

source:
  root: "../codebase"
  include_dir: "include"
  src_dir: "src"
  extensions: [".h", ".cc", ".cpp"]
  exclude_patterns:
    - "**/test/**"
    - "**/testing/**"
    - "**/*_unittest*"
    - "**/*_test.*"
    - "**/*-test.*"

output:
  root: "../output/v8-rust"

cache:
  dir: "../.pipeline-cache"

model:
  # Provider: "claude", "gemini", or "openrouter"
  provider: "gemini"
  # Model name (provider-specific)
  # OpenRouter free models (often rate-limited):
  #   qwen/qwen3-coder:free
  #   qwen/qwen3-235b-a22b:free
  #   meta-llama/llama-4-maverick:free
  #   google/gemma-3-27b-it:free
  name: "gemini-2.0-flash"
  # Environment variable holding the API key
  api_key_env: "GEMINI_API_KEY"
  # Maximum tokens per response
  max_tokens: 8192

conversion:
  # Max files to convert per AI call
  batch_size: 5
  # Max parallel conversion workers (for future use)
  max_concurrent: 4
  # Retry failed API calls up to N times
  max_retries: 3
  # Max file size in bytes before truncation
  max_file_size: 150000
  # Delay between retries (seconds, multiplied by attempt number)
  retry_delay: 5
